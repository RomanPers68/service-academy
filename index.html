<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Service Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Telegram-инициализация: развернуть мини-апп на весь экран и отдать
      // вертикальные свайпы контенту. Без expand() на Android жесты таскают
      // шторку самого Telegram вместо скролла — «скролл не работает».
      (function () {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) return;
          tg.ready();
          tg.expand();
          if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        } catch (e) {}
      })();
    </script>
    <!-- Акцентный шрифт Piazzolla (заголовки и цифры). Загрузка неблокирующая:
         приложение стартует сразу на Georgia, шрифт подъезжает фоном.
         Основной источник jsDelivr, при недоступности — Google Fonts. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://cdn.jsdelivr.net/npm/@fontsource/piazzolla@5/700.css"
      onerror="var l=document.createElement('link');l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family=Piazzolla:opsz,wght@8..30,700&display=swap';document.head.appendChild(l)">
  </head>
  <body>
    <!-- Брендовый сплэш: виден с первой миллисекунды, до загрузки JS.
         Тема берётся из localStorage, чтобы не мигать не тем цветом. -->
    <style>
      #sa-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#171208;transition:opacity .35s ease;pointer-events:none}
      #sa-splash.light{background:#EFE6D2}
      #sa-splash .mark{font-family:Georgia,serif;color:#C8A96E;font-size:16px;letter-spacing:7px;animation:saSplashPulse 1.1s ease-in-out infinite}
      #sa-splash.light .mark{color:#8B6A30}
      @keyframes saSplashPulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
    <div id="sa-splash"><div class="mark">✦ SA</div></div>
    <script>try{if(localStorage.getItem("sa_a11y")==="1")document.getElementById("sa-splash").className="light"}catch(e){}</script>
    <div id="root"></div>
    <script type="module" src="/main.jsx?v=20260610"></script>
  </body>
</html>
